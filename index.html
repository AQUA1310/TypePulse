<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypePulse - Check Your Typing Speed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="test-container">
        <header>
            <div class="logo">TypePulse</div>
        </header>

        <div class="stats-dashboard">
            <div class="stat-card">
                <span class="stat-label">wpm</span>
                <span class="stat-value" id="wpm-display">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">acc</span>
                <span class="stat-value" id="accuracy-display">100%</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">time</span>
                <span class="stat-value" id="timer-display">30s</span>
            </div>
        </div>

        <div class="words-container" id="words-container">
            <span class="word"><span class="letter current">t</span><span class="letter">h</span><span class="letter">e</span></span>
            <span class="word"><span class="letter">q</span><span class="letter">u</span><span class="letter">i</span><span class="letter">c</span><span class="letter">k</span></span>
            <span class="word"><span class="letter">b</span><span class="letter">r</span><span class="letter">o</span><span class="letter">w</span><span class="letter">n</span></span>
            <span class="word"><span class="letter">f</span><span class="letter">o</span><span class="letter">x</span></span>
        </div>

        <input type="text" id="hidden-input" class="hidden-input" autofocus autocomplete="off" autocapitalize="off">

        <div class="control-section">
            <button id="restart-btn" class="restart-btn">
                Restart Test
            </button>
        </div>
    </div>

</body>
</html>
